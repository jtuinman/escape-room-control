<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Escape Room Control</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <main>
    <div class="header-row">
      <h1 class="header-title">
        Escape Room Control
        <span id="connDot" class="connDot"></span>
      </h1>
      <div class="buttons header-buttons">
        <button class="btn" id="lang-nl" type="button">NL</button>
        <button class="btn" id="lang-en" type="button">EN</button>
      </div>
    </div>

    <div class="layout layout-3col">
      <div class="col">
        <section class="card">
          <div class="row">
            <div>
              <div class="muted">Game state</div>
              <div id="gameState" class="big">…</div>
            </div>
            <div class="timerBox">
              <div id="timer" class="big mono">00:00</div>
            </div>
          </div>

          <div class="buttons">
            <button class="btn" data-state="idle">idle</button>
            <button class="btn" data-state="scene_1">scene 1</button>
            <button class="btn" data-state="scene_2">scene 2</button>
            <button class="btn" data-state="end_game">end game</button>
          </div>
        </section>

        <section class="card hints-card">
          <div class="row hints-header-row">
            <h2 class="hints-title">Hints</h2>
            <div class="muted hints-scene-wrap">Scene: <span id="hints-scene"></span></div>
          </div>
          <ul id="hints" class="list compact"></ul>
        </section>
      </div>

      <div class="col">
        <section class="card">
          <h2>Inputs</h2>
          <ul class="list compact" id="list">
            {% for label in inputs %}
            <li class="row compactRow">
              <span class="label">{{ label }}</span>
              <span class="dot unknown" id="dot-{{ label|replace(' ', '_') }}" title="…"></span>
            </li>
            {% endfor %}
          </ul>
        </section>

        <section class="card">
          <h2>Relays</h2>
          <div class="buttons" id="relayButtons">
            <button class="btn" data-relay="relay_1" id="relay-btn-relay_1">lamp</button>
            <button class="btn" data-relay="relay_2" id="relay-btn-relay_2">spot</button>
            <button class="btn" data-relay="relay_3" id="relay-btn-relay_3">niet beschikbaar</button>
            <button class="btn" data-relay="relay_4" id="relay-btn-relay_4">magneet</button>
          </div>
        </section>

        <section class="card">
          <h2>Critical</h2>
          <div class="buttons">
            <button class="btn danger hidden" id="shutdownBtn" type="button">shutdown pi</button>
            <button class="btn warn hidden" id="rebootBtn" type="button">reboot pi</button>
          </div>
        </section>
      </div>

      <div class="col cameraColumn">
        <section class="card camerasCard">
          <div class="cameraGrid">
            <div class="cameraItem" id="camera-card-cam1">
              <div class="cameraFrameWrap">
                <iframe class="cameraFrame" id="camera-frame-cam1" title="Camera 1" loading="lazy" allowfullscreen
                  referrerpolicy="no-referrer"></iframe>
                <a class="btn small cameraOpenBtn hidden" id="camera-open-cam1" target="_blank"
                  rel="noopener noreferrer">open</a>
              </div>
            </div>

            <div class="cameraItem" id="camera-card-cam2">
              <div class="cameraFrameWrap">
                <iframe class="cameraFrame" id="camera-frame-cam2" title="Camera 2" loading="lazy" allowfullscreen
                  referrerpolicy="no-referrer"></iframe>
                <a class="btn small cameraOpenBtn hidden" id="camera-open-cam2" target="_blank"
                  rel="noopener noreferrer">open</a>
              </div>
            </div>

            <div class="cameraItem" id="camera-card-cam3">
              <div class="cameraFrameWrap">
                <iframe class="cameraFrame" id="camera-frame-cam3" title="Camera 3" loading="lazy" allowfullscreen
                  referrerpolicy="no-referrer"></iframe>
                <a class="btn small cameraOpenBtn hidden" id="camera-open-cam3" target="_blank"
                  rel="noopener noreferrer">open</a>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script type="application/json" id="app-config">{{ {"camera_streams": camera_streams} | tojson }}</script>
  <script src="/static/app.js"></script>
</body>

</html>
